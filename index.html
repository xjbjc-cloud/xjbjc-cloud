<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSW路标站</title>
    <meta name="description" content="SSW 最新地址发布与紧急访问通道">
    <style>
        :root {
            --primary-color: #4facfe;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .terminal-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .countdown-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .countdown-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        }

        .action-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-link:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--primary-color);
        }

        .notice-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 15px 0;
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 25px 0;
        }

        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .btn-emergency {
            display: block;
            padding: 12px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-emergency:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .terminal-card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            h1 { font-size: 1.5rem; }
            .countdown-number { font-size: 2.5rem; }
            .emergency-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main class="terminal-card">
        <h1>SSW路标站</h1>
        <p class="subtitle">即将为您重定向至最新域名</p>

        <section class="countdown-wrapper">
            <p style="font-size: 0.9rem; color: var(--text-muted);">浏览器将在</p>
            <div class="countdown-number" id="timerDisplay">30</div>
            <p style="font-size: 0.9rem; color: var(--text-muted);">秒后自动跳转</p>
        </section>

        <a href="https://www.ssw4.win" class="action-link">点击此处手动跳转 &rarr;</a>

        <div class="divider"></div>

        <p class="notice-text">
            📌 永久域名：<a href="https://ssw.one" class="action-link" style="font-size: 0.85rem;">ssw.one</a> 
        </p>

        <p style="margin-top: 20px; font-size: 0.9rem;">紧急访问通道：</p>
        <div class="emergency-grid">
            <a href="https://sswj2.happybush-f24ac612.eastasia.azurecontainerapps.io" class="btn-emergency">紧急通道 1</a>
            <a href="https://sswj4.ambitiousgrass-b395f30e.japaneast.azurecontainerapps.io" class="btn-emergency">紧急通道 2</a>
            <a href="https://ssw3j.salmontree-0b2d5b76.eastasia.azurecontainerapps.io" class="btn-emergency">紧急通道 3</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const TARGET_URL = 'https://www.ssw4.win';
            const TOTAL_SECONDS = 30;
            const timerElement = document.getElementById('timerDisplay');
            let remainingTime = TOTAL_SECONDS;

            const timerInterval = setInterval(() => {
                remainingTime--;
                timerElement.textContent = remainingTime;
                
                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    window.location.replace(TARGET_URL); 
                }
            }, 1000);
        });
    </script>
</body>
</html>
